<div class="hero-container" [class.visible]="animationState.heroVisible">
  <!-- Left Content Section -->
  <div class="hero-content" [class.fade-in]="animationState.contentVisible">
    <h1 class="hero-title">Fraudexia</h1>
    <p class="hero-subtitle">
      Payment methods with devices. Smart and safe online management.
    </p>
    <button 
      class="cta-button" 
      (click)="onWelcomeClick()"
      aria-label="Welcome button">
      Welcome
      <span class="button-icon">→</span>
    </button>
  </div>

  <!-- Right Decorative Section with SVG Illustrations -->
  <div class="hero-illustration" [class.fade-in]="animationState.contentVisible">
    <svg viewBox="0 0 500 600" class="illustration-svg" preserveAspectRatio="xMidYMid meet">
      <!-- Gradient Definitions -->
      <defs>
        <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4B0082;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="lightPurple" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#9D8FFF;stop-opacity:0.6" />
          <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.4" />
        </linearGradient>
        <filter id="shadow">
          <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2" />
        </filter>
      </defs>

      <!-- Background Blob Shapes -->
      <circle class="blob blob-1" cx="100" cy="150" r="80" fill="url(#lightPurple)" opacity="0.3" />
      <circle class="blob blob-2" cx="450" cy="450" r="100" fill="url(#lightPurple)" opacity="0.25" />

      <!-- Giant Smartphone -->
      <g class="smartphone" filter="url(#shadow)">
        <!-- Phone Body -->
        <rect x="150" y="80" width="200" height="380" rx="24" fill="url(#purpleGradient)" />
        <!-- Phone Screen -->
        <rect x="165" y="100" width="170" height="340" rx="20" fill="#F0F0F0" />
        <!-- Notch -->
        <rect x="200" y="100" width="100" height="20" rx="10" fill="#333" />
        <!-- Screen Content -->
        <circle cx="240" cy="200" r="35" fill="#6C63FF" opacity="0.5" />
        <rect x="175" y="255" width="130" height="8" rx="4" fill="#6C63FF" opacity="0.4" />
        <rect x="175" y="275" width="100" height="8" rx="4" fill="#6C63FF" opacity="0.3" />
      </g>

      <!-- Bank Building -->
      <g class="bank-building" transform="translate(350, 250)">
        <!-- Building Base -->
        <rect x="0" y="20" width="100" height="140" fill="#6C63FF" opacity="0.6" />
        <!-- Building Door -->
        <rect x="35" y="140" width="30" height="50" fill="#4B0082" />
        <!-- Door Handle -->
        <circle cx="63" cy="165" r="3" fill="#FFD700" />
        <!-- Windows -->
        <g id="windows">
          <rect x="10" y="40" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="40" y="40" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="70" y="40" width="20" height="20" fill="#4B0082" opacity="0.8" />
          
          <rect x="10" y="75" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="40" y="75" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="70" y="75" width="20" height="20" fill="#4B0082" opacity="0.8" />
          
          <rect x="10" y="110" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="40" y="110" width="20" height="20" fill="#4B0082" opacity="0.8" />
          <rect x="70" y="110" width="20" height="20" fill="#4B0082" opacity="0.8" />
        </g>
        <!-- Roof -->
        <polygon points="0,20 50,-10 100,20" fill="#4B0082" opacity="0.9" />
        <!-- Flag -->
        <line x1="50" y1="-10" x2="50" y2="-40" stroke="#FFD700" stroke-width="2" />
        <rect x="50" y="-40" width="25" height="15" fill="#FFD700" />
      </g>

      <!-- Tiny People Section -->
      <g class="people-group">
        <!-- Person 1 - Left -->
        <g transform="translate(80, 480)">
          <circle cx="0" cy="0" r="8" fill="#6C63FF" />
          <rect x="-6" y="8" width="12" height="20" rx="2" fill="#6C63FF" opacity="0.8" />
          <line x1="-10" y1="12" x2="-18" y2="8" stroke="#6C63FF" stroke-width="2" />
          <line x1="10" y1="12" x2="18" y2="8" stroke="#6C63FF" stroke-width="2" />
          <!-- Coins around person -->
          <circle cx="0" cy="-25" r="4" fill="#FFD700" />
          <circle cx="15" cy="-20" r="3" fill="#FFD700" opacity="0.7" />
        </g>

        <!-- Person 2 - Center -->
        <g transform="translate(250, 520)">
          <circle cx="0" cy="0" r="8" fill="#9D8FFF" />
          <rect x="-6" y="8" width="12" height="20" rx="2" fill="#9D8FFF" opacity="0.8" />
          <line x1="-10" y1="12" x2="-18" y2="8" stroke="#9D8FFF" stroke-width="2" />
          <line x1="10" y1="12" x2="18" y2="8" stroke="#9D8FFF" stroke-width="2" />
          <!-- Credit card icon -->
          <rect x="-15" y="-30" width="30" height="18" rx="2" fill="#FFD700" opacity="0.6" />
        </g>

        <!-- Person 3 - Right -->
        <g transform="translate(420, 490)">
          <circle cx="0" cy="0" r="8" fill="#6C63FF" />
          <rect x="-6" y="8" width="12" height="20" rx="2" fill="#6C63FF" opacity="0.8" />
          <line x1="-10" y1="12" x2="-18" y2="8" stroke="#6C63FF" stroke-width="2" />
          <line x1="10" y1="12" x2="18" y2="8" stroke="#6C63FF" stroke-width="2" />
          <!-- Shield/security icon -->
          <path d="M -8,-30 L 0,-45 L 8,-30 L 8,-15 Q 0,-8 -8,-15 Z" fill="#FFD700" opacity="0.6" />
        </g>
      </g>

      <!-- Financial Icons Floating -->
      <g class="financial-icons">
        <!-- Dollar Sign -->
        <text x="150" y="320" font-size="36" fill="#FFD700" opacity="0.4" font-weight="bold">$</text>
        <!-- Bitcoin-like icon -->
        <circle cx="350" cy="150" r="15" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5" />
        <text x="345" cy="160" font-size="20" fill="#FFD700" opacity="0.5">₿</text>
      </g>
    </svg>
  </div>
</div>
